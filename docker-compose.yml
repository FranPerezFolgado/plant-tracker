services:

  # ── MQTT Broker (Mosquitto) ──────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # WebSockets (optional, for browser-based clients)
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  # ── Time-Series Database (InfluxDB v2) ───────────────────────────────────
  influxdb:
    image: influxdb:2
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      # Initial setup — change these values before deploying to production.
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword   # TODO: use a secret
      DOCKER_INFLUXDB_INIT_ORG: plant-tracker
      DOCKER_INFLUXDB_INIT_BUCKET: sensors
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: changeme-token  # TODO: use a secret
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    restart: unless-stopped

  # ── Plant Tracker Application ────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plant-tracker-app
    ports:
      - "8000:8000"
    environment:
      # MQTT
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: "1883"
      MQTT_TOPIC: zigbee2mqtt/#
      # InfluxDB
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: changeme-token  # TODO: use a secret / Docker secret
      INFLUXDB_ORG: plant-tracker
      INFLUXDB_BUCKET: sensors
    depends_on:
      - mosquitto
      - influxdb
    restart: unless-stopped

# ── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  influxdb_config:
