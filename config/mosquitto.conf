# Mosquitto MQTT Broker — basic configuration
# Place this file at config/mosquitto.conf and mount it into the container.

# ── Listener ──────────────────────────────────────────────────────────────
# Accept connections on the default MQTT port.
listener 1883

# ── Authentication ────────────────────────────────────────────────────────
# Allow unauthenticated connections for local / development use.
# TODO: For production, set allow_anonymous to false and configure a
#       password file with: password_file /mosquitto/config/passwd
allow_anonymous true

# ── Persistence ───────────────────────────────────────────────────────────
# Persist messages across broker restarts.
persistence true
persistence_location /mosquitto/data/

# ── Logging ───────────────────────────────────────────────────────────────
log_dest stdout
log_type all
